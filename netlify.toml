[build]
  command = "npm run build"

# Next.js plugin handles publishing automatically

# Headers for caching and security
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Client offer/checkout pages embed a same-origin preview iframe of the site
# (checkout thumbnail). Allow same-origin framing for these paths only.
[[headers]]
  for = "/sites/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
